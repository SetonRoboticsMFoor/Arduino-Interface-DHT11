<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DHT11 Telemetry Studio</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --card-border: rgba(255, 255, 255, 0.1);
      --accent-cyan: #38bdf8;
      --temp-red: #ef4444;
      --humidity-blue: #3b82f6;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      background: var(--card-bg);
      width: 100%;
      max-width: 650px;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid var(--card-border);
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 22px;
      margin: 0;
      letter-spacing: 0.5px;
    }

    /* Unit Toggle Switch */
    .unit-switch {
      display: flex;
      align-items: center;
      background: rgba(0, 0, 0, 0.3);
      padding: 4px;
      border-radius: 20px;
      border: 1px solid var(--card-border);
    }

    .unit-btn {
      padding: 4px 12px;
      font-size: 13px;
      font-weight: 700;
      border: none;
      background: transparent;
      color: var(--text-muted);
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .unit-btn.active {
      background: var(--accent-cyan);
      color: #0f172a;
    }

    /* Controls */
    .btn-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      flex: 1;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .connect-btn { background-color: var(--accent-cyan); color: #0f172a; }
    .connect-btn:hover:not(:disabled) { background-color: #0284c7; color: white; }

    .disconnect-btn { background-color: #334155; color: var(--text-muted); }
    .disconnect-btn:hover:not(:disabled) { background-color: #ef4444; color: white; }

    .record-btn { background-color: #22c55e; color: #0f172a; }
    .record-btn:hover:not(:disabled) { background-color: #16a34a; color: white; }

    .stop-btn { background-color: #f59e0b; color: #0f172a; }
    .stop-btn:hover:not(:disabled) { background-color: #d97706; color: white; }

    .save-btn { background-color: #8b5cf6; color: white; }
    .save-btn:hover:not(:disabled) { background-color: #7c3aed; }

    .clear-btn { background-color: #64748b; color: white; }
    .clear-btn:hover:not(:disabled) { background-color: #475569; }

    button:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Metric Cards */
    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }

    .metric-card {
      background: rgba(0, 0, 0, 0.25);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid var(--card-border);
      text-align: center;
    }

    .metric-card label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: block;
      margin-bottom: 6px;
    }

    .metric-value {
      font-size: 32px;
      font-weight: bold;
      font-family: monospace;
    }

    /* Chart Container */
    .chart-wrapper {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 12px;
      padding: 15px;
      border: 1px solid var(--card-border);
      position: relative;
      height: 280px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-row">
      <h1>DHT11 Telemetry Studio</h1>
      <div class="unit-switch">
        <button id="btnCelsius" class="unit-btn active">°C</button>
        <button id="btnFahrenheit" class="unit-btn">°F</button>
      </div>
    </div>

    <div class="btn-group">
      <button id="connectBtn" class="connect-btn">Connect</button>
      <button id="disconnectBtn" class="disconnect-btn" disabled>Disconnect</button>
    </div>

    <div class="metric-grid">
      <div class="metric-card">
        <label style="color: var(--temp-red);">Temperature</label>
        <div id="tempDisplay" class="metric-value">-- °C</div>
      </div>
      <div class="metric-card">
        <label style="color: var(--humidity-blue);">Humidity</label>
        <div id="humDisplay" class="metric-value">-- %</div>
      </div>
    </div>

    <div class="btn-group">
      <button id="recordBtn" class="record-btn" disabled>Record</button>
      <button id="stopBtn" class="stop-btn" disabled>Stop</button>
      <button id="saveBtn" class="save-btn" disabled>Save CSV</button>
      <button id="clearBtn" class="clear-btn" disabled>Clear</button>
    </div>

    <div class="chart-wrapper">
      <canvas id="telemetryChart"></canvas>
    </div>
  </div>

  <script>
    let port, reader, readableStreamClosed;
    let isRecording = false;
    let timeIndex = 0;
    let currentUnit = 'C'; // 'C' or 'F'

    // Raw temperature storage in Celsius so unit switching can convert dynamically
    let rawTempHistory = [];
    let humidityHistory = [];
    let timeLabels = [];
    let lastRawTemp = null;
    let lastRawHum = null;

    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const recordBtn = document.getElementById('recordBtn');
    const stopBtn = document.getElementById('stopBtn');
    const saveBtn = document.getElementById('saveBtn');
    const clearBtn = document.getElementById('clearBtn');

    const btnCelsius = document.getElementById('btnCelsius');
    const btnFahrenheit = document.getElementById('btnFahrenheit');

    const tempDisplay = document.getElementById('tempDisplay');
    const humDisplay = document.getElementById('humDisplay');

    // Chart.js Setup
    const ctx = document.getElementById('telemetryChart').getContext('2d');
    const telemetryChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [
          {
            label: 'Temp (°C)',
            borderColor: '#ef4444',
            backgroundColor: 'rgba(239, 68, 68, 0.1)',
            data: [],
            borderWidth: 2,
            tension: 0.3,
            fill: true,
            yAxisID: 'yTemp'
          },
          {
            label: 'Humidity (%)',
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59, 130, 246, 0.1)',
            data: [],
            borderWidth: 2,
            tension: 0.3,
            fill: true,
            yAxisID: 'yHum'
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: {
            grid: { color: 'rgba(255, 255, 255, 0.05)' },
            ticks: { color: '#94a3b8' }
          },
          yTemp: {
            type: 'linear',
            position: 'left',
            title: { display: true, text: 'Temp (°C)', color: '#ef4444' },
            grid: { color: 'rgba(255, 255, 255, 0.05)' },
            ticks: { color: '#94a3b8' }
          },
          yHum: {
            type: 'linear',
            position: 'right',
            title: { display: true, text: 'Humidity (%)', color: '#3b82f6' },
            grid: { drawOnChartArea: false },
            ticks: { color: '#94a3b8' }
          }
        },
        plugins: {
          legend: { labels: { color: '#f8fafc' } }
        }
      }
    });

    // Helper to convert C to F
    function cToF(c) {
      return (c * 9 / 5) + 32;
    }

    // Read serial stream line-by-line
    async function readSerialData() {
      const textDecoder = new TextDecoderStream();
      readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
      reader = textDecoder.readable.getReader();

      let buffer = '';

      try {
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          buffer += value;
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            parseAndProcessLine(line.trim());
          }
        }
      } catch (err) {
        console.warn('Reader stream cancelled or ended:', err);
      }
    }

    // Process incoming string ("23.50,45.00")
    function parseAndProcessLine(line) {
      if (!line) return;

      const parts = line.split(',');
      if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
        lastRawTemp = parseFloat(parts[0]);
        lastRawHum = parseFloat(parts[1]);

        updateCards();

        // If recording is active, store history
        if (isRecording) {
          timeIndex++;
          const label = `${timeIndex}s`;

          timeLabels.push(label);
          rawTempHistory.push(lastRawTemp);
          humidityHistory.push(lastRawHum);

          const displayTemp = currentUnit === 'C' ? lastRawTemp : cToF(lastRawTemp);

          telemetryChart.data.labels.push(label);
          telemetryChart.data.datasets[0].data.push(displayTemp.toFixed(1));
          telemetryChart.data.datasets[1].data.push(lastRawHum.toFixed(1));
          telemetryChart.update('none');

          saveBtn.disabled = false;
          clearBtn.disabled = false;
        }
      }
    }

    // Update Telemetry Display Cards
    function updateCards() {
      if (lastRawTemp !== null && lastRawHum !== null) {
        const temp = currentUnit === 'C' ? lastRawTemp : cToF(lastRawTemp);
        tempDisplay.textContent = `${temp.toFixed(1)} °${currentUnit}`;
        humDisplay.textContent = `${lastRawHum.toFixed(1)} %`;
      }
    }

    // Switch Unit (°C / °F)
    function setUnit(unit) {
      currentUnit = unit;
      if (unit === 'C') {
        btnCelsius.classList.add('active');
        btnFahrenheit.classList.remove('active');
      } else {
        btnFahrenheit.classList.add('active');
        btnCelsius.classList.remove('active');
      }

      // Update Chart Y-Axis Label and Data Points
      const unitLabel = `Temp (°${currentUnit})`;
      telemetryChart.options.scales.yTemp.title.text = unitLabel;
      telemetryChart.data.datasets[0].label = unitLabel;

      telemetryChart.data.datasets[0].data = rawTempHistory.map(t => 
        (currentUnit === 'C' ? t : cToF(t)).toFixed(1)
      );
      
      telemetryChart.update();
      updateCards();
    }

    btnCelsius.addEventListener('click', () => setUnit('C'));
    btnFahrenheit.addEventListener('click', () => setUnit('F'));

    // Export Data as CSV File
    saveBtn.addEventListener('click', () => {
      if (rawTempHistory.length === 0) return;

      let csvContent = `data:text/csv;charset=utf-8,Time (s),Temperature (°${currentUnit}),Humidity (%)\n`;

      timeLabels.forEach((label, index) => {
        const rawT = rawTempHistory[index];
        const displayT = (currentUnit === 'C' ? rawT : cToF(rawT)).toFixed(2);
        const hum = humidityHistory[index].toFixed(2);
        csvContent += `${label},${displayT},${hum}\n`;
      });

      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", `dht11_telemetry_${new Date().toISOString().slice(0,10)}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body
