<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DHT11 Live Logger</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --card-border: rgba(255, 255, 255, 0.1);
      --accent-cyan: #38bdf8;
      --temp-red: #ef4444;
      --humidity-blue: #3b82f6;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      background: var(--card-bg);
      width: 100%;
      max-width: 650px;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid var(--card-border);
    }

    h1 {
      font-size: 22px;
      margin-top: 0;
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      flex: 1;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .connect-btn { background-color: var(--accent-cyan); color: #0f172a; }
    .connect-btn:hover:not(:disabled) { background-color: #0284c7; color: white; }

    .disconnect-btn { background-color: #334155; color: var(--text-muted); }
    .disconnect-btn:hover:not(:disabled) { background-color: #ef4444; color: white; }

    .record-btn { background-color: #22c55e; color: #0f172a; }
    .record-btn:hover:not(:disabled) { background-color: #16a34a; color: white; }

    .stop-btn { background-color: #f59e0b; color: #0f172a; }
    .stop-btn:hover:not(:disabled) { background-color: #d97706; color: white; }

    button:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Telemetry Display Cards */
    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }

    .metric-card {
      background: rgba(0, 0, 0, 0.25);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid var(--card-border);
      text-align: center;
    }

    .metric-card label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: block;
      margin-bottom: 6px;
    }

    .metric-value {
      font-size: 32px;
      font-weight: bold;
      font-family: monospace;
    }

    /* Chart Container */
    .chart-wrapper {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 12px;
      padding: 15px;
      border: 1px solid var(--card-border);
      position: relative;
      height: 280px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>DHT11 Telemetry Studio</h1>

    <div class="btn-group">
      <button id="connectBtn" class="connect-btn">Connect</button>
      <button id="disconnectBtn" class="disconnect-btn" disabled>Disconnect</button>
    </div>

    <div class="metric-grid">
      <div class="metric-card">
        <label style="color: var(--temp-red);">Temperature</label>
        <div id="tempDisplay" class="metric-value">-- °C</div>
      </div>
      <div class="metric-card">
        <label style="color: var(--humidity-blue);">Humidity</label>
        <div id="humDisplay" class="metric-value">-- %</div>
      </div>
    </div>

    <div class="btn-group">
      <button id="recordBtn" class="record-btn" disabled>Record</button>
      <button id="stopBtn" class="stop-btn" disabled>Stop</button>
    </div>

    <div class="chart-wrapper">
      <canvas id="telemetryChart"></canvas>
    </div>
  </div>

  <script>
    let port, reader, readableStreamClosed;
    let isRecording = false;
    let timeIndex = 0;

    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const recordBtn = document.getElementById('recordBtn');
    const stopBtn = document.getElementById('stopBtn');

    const tempDisplay = document.getElementById('tempDisplay');
    const humDisplay = document.getElementById('humDisplay');

    // Chart.js Setup
    const ctx = document.getElementById('telemetryChart').getContext('2d');
    const telemetryChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [
          {
            label: 'Temp (°C)',
            borderColor: '#ef4444',
            backgroundColor: 'rgba(239, 68, 68, 0.1)',
            data: [],
            borderWidth: 2,
            tension: 0.3,
            fill: true,
            yAxisID: 'yTemp'
          },
          {
            label: 'Humidity (%)',
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59, 130, 246, 0.1)',
            data: [],
            borderWidth: 2,
            tension: 0.3,
            fill: true,
            yAxisID: 'yHum'
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: {
            grid: { color: 'rgba(255, 255, 255, 0.05)' },
            ticks: { color: '#94a3b8' }
          },
          yTemp: {
            type: 'linear',
            position: 'left',
            title: { display: true, text: 'Temp (°C)', color: '#ef4444' },
            grid: { color: 'rgba(255, 255, 255, 0.05)' },
            ticks: { color: '#94a3b8' }
          },
          yHum: {
            type: 'linear',
            position: 'right',
            title: { display: true, text: 'Humidity (%)', color: '#3b82f6' },
            grid: { drawOnChartArea: false },
            ticks: { color: '#94a3b8' }
          }
        },
        plugins: {
          legend: { labels: { color: '#f8fafc' } }
        }
      }
    });

    // Read serial data line-by-line continuously
    async function readSerialData() {
      const textDecoder = new TextDecoderStream();
      readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
      reader = textDecoder.readable.getReader();

      let buffer = '';

      try {
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          buffer += value;
          const lines = buffer.split('\n');
          buffer = lines.pop(); // Retain unfinished tail string

          for (const line of lines) {
            parseAndProcessLine(line.trim());
          }
        }
      } catch (err) {
        console.warn('Reader error or cancelled stream:', err);
      }
    }

    // Process incoming line ("23.50,45.00")
    function parseAndProcessLine(line) {
      if (!line) return;

      const parts = line.split(',');
      if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
        const temp = parseFloat(parts[0]).toFixed(1);
        const hum = parseFloat(parts[1]).toFixed(1);

        // Update real-time metric display cards
        tempDisplay.textContent = `${temp} °C`;
        humDisplay.textContent = `${hum} %`;

        // If recording is active, push to chart
        if (isRecording) {
          timeIndex++;
          telemetryChart.data.labels.push(`${timeIndex}s`);
          telemetryChart.data.datasets[0].data.push(temp);
          telemetryChart.data.datasets[1].data.push(hum);
          telemetryChart.update('none'); // Smooth live update
        }
      }
    }

    // Connect Button Event
    connectBtn.addEventListener('click', async () => {
      if ('serial' in navigator) {
        try {
          port = await navigator.serial.requestPort();
          await port.open({ baudRate: 9600 });

          connectBtn.disabled = true;
          disconnectBtn.disabled = false;
          recordBtn.disabled = false;

          readSerialData();

        } catch (err) {
          console.error('Error connecting:', err);
          alert('Failed to connect: ' + err.message);
        }
      } else {
        alert('Web Serial API is not supported in this browser.');
      }
    });

    // Disconnect Button Event
    disconnectBtn.addEventListener('click', async () => {
      if (port) {
        try {
          isRecording = false;

          if (reader) {
            await reader.cancel();
            await readableStreamClosed.catch(() => {});
            reader = null;
          }

          await port.close();
        } catch (err) {
          console.warn('Disconnect warning:', err);
        } finally {
          port = null;

          connectBtn.disabled = false;
          disconnectBtn.disabled = true;
          recordBtn.disabled = true;
          stopBtn.disabled = true;

          tempDisplay.textContent = '-- °C';
          humDisplay.textContent = '-- %';
        }
      }
    });

    // Record Control Events
    recordBtn.addEventListener('click', () => {
      isRecording = true;
      recordBtn.disabled = true;
      stopBtn.disabled = false;
    });

    stopBtn.addEventListener('click', () => {
      isRecording = false;
      recordBtn.disabled = false;
      stopBtn.disabled = true;
    });
  </script>
</body>
</html>
